<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biomass Batch Processing SOP</title>
<style>
  :root {
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --success: #34a853;
    --warning: #f9ab00;
    --danger: #ea4335;
    --bg: #f0f2f5;
    --card: #ffffff;
    --text: #202124;
    --text-light: #5f6368;
    --border: #dadce0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--primary);
    color: white;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header .user-info { display: flex; align-items: center; gap: 12px; font-size: 14px; }
  .header .user-info .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.25); display: flex;
    align-items: center; justify-content: center; font-weight: 700;
  }
  .header button {
    background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
    color: white; padding: 6px 14px; border-radius: 6px; cursor: pointer;
    font-size: 13px;
  }
  .header button:hover { background: rgba(255,255,255,0.3); }

  /* SCREENS */
  .screen { display: none; max-width: 800px; margin: 0 auto; padding: 24px; }
  .screen.active { display: block; }

  /* LOGIN */
  .login-screen {
    display: none; justify-content: center; align-items: center;
    min-height: 100vh; background: linear-gradient(135deg, #1a73e8, #0d47a1);
  }
  .login-screen.active { display: flex; }
  .login-card {
    background: white; border-radius: 16px; padding: 48px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2); text-align: center;
    width: 100%; max-width: 420px;
  }
  .login-card h1 { font-size: 28px; margin-bottom: 8px; color: var(--text); }
  .login-card p { color: var(--text-light); margin-bottom: 32px; }
  .login-card .logo { font-size: 48px; margin-bottom: 16px; }

  /* FORMS */
  .form-group { margin-bottom: 20px; text-align: left; }
  .form-group label {
    display: block; font-size: 13px; font-weight: 600;
    margin-bottom: 6px; color: var(--text-light); text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 12px 16px; border: 2px solid var(--border);
    border-radius: 10px; font-size: 16px; transition: border-color 0.2s;
    background: white;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none; border-color: var(--primary);
  }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 24px; border-radius: 10px; font-size: 15px;
    font-weight: 600; cursor: pointer; border: none; transition: all 0.2s;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-primary:disabled { background: #94b8e8; cursor: not-allowed; }
  .btn-success { background: var(--success); color: white; }
  .btn-success:hover { background: #2d9249; }
  .btn-danger { background: var(--danger); color: white; }
  .btn-danger:hover { background: #c5221f; }
  .btn-outline {
    background: white; color: var(--primary); border: 2px solid var(--primary);
  }
  .btn-outline:hover { background: #e8f0fe; }
  .btn-block { width: 100%; justify-content: center; }
  .btn-lg { padding: 16px 32px; font-size: 17px; }

  /* CARDS */
  .card {
    background: var(--card); border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08); padding: 24px;
    margin-bottom: 16px; border: 1px solid var(--border);
  }

  /* DASHBOARD */
  .dashboard-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px;
  }
  .dashboard-header h2 { font-size: 24px; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat-card {
    background: white; border-radius: 12px; padding: 20px;
    border: 1px solid var(--border); text-align: center;
  }
  .stat-card .stat-num { font-size: 32px; font-weight: 700; color: var(--primary); }
  .stat-card .stat-label { font-size: 13px; color: var(--text-light); margin-top: 4px; }

  .batch-list-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px; border-bottom: 1px solid #f0f0f0;
  }
  .batch-list-item:last-child { border-bottom: none; }
  .batch-id { font-weight: 700; font-size: 16px; color: var(--primary); font-family: monospace; }
  .batch-status {
    padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
  }
  .batch-status.completed { background: #e6f4ea; color: var(--success); }
  .batch-status.in-progress { background: #fef7e0; color: #b06d00; }

  /* SOP STEPS */
  .sop-progress {
    display: flex; gap: 4px; margin-bottom: 32px; padding: 0;
  }
  .sop-progress .step-dot {
    flex: 1; height: 6px; border-radius: 3px; background: var(--border);
    transition: background 0.3s;
  }
  .sop-progress .step-dot.done { background: var(--success); }
  .sop-progress .step-dot.active { background: var(--primary); }

  .step-card {
    background: white; border-radius: 16px; padding: 32px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06); border: 2px solid var(--border);
    margin-bottom: 16px;
  }
  .step-card.active { border-color: var(--primary); }
  .step-number {
    display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--primary); color: white; font-weight: 700;
    font-size: 14px; margin-bottom: 12px;
  }
  .step-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .step-desc { color: var(--text-light); margin-bottom: 20px; line-height: 1.5; }

  .step-actions { display: flex; gap: 12px; margin-top: 20px; }

  /* PHOTO UPLOAD */
  .photo-upload {
    border: 2px dashed var(--border); border-radius: 12px;
    padding: 24px; text-align: center; cursor: pointer;
    transition: all 0.2s; position: relative; overflow: hidden;
  }
  .photo-upload:hover { border-color: var(--primary); background: #f8f9ff; }
  .photo-upload input { display: none; }
  .photo-upload .icon { font-size: 36px; margin-bottom: 8px; }
  .photo-upload .label { font-size: 14px; color: var(--text-light); }
  .photo-upload img {
    max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 12px;
  }
  .photo-upload.has-photo { border-color: var(--success); background: #f0faf2; }

  /* PH INPUT */
  .ph-display {
    font-size: 48px; font-weight: 700; text-align: center;
    padding: 20px; border-radius: 12px; margin: 16px 0;
  }
  .ph-display.high { background: #fce8e6; color: var(--danger); }
  .ph-display.target { background: #e6f4ea; color: var(--success); }
  .ph-display.neutral { background: #f0f0f0; color: var(--text-light); }

  .ph-input-row {
    display: flex; gap: 12px; align-items: center; justify-content: center;
  }
  .ph-input-row input {
    width: 120px; text-align: center; font-size: 24px; font-weight: 600;
    padding: 12px; border: 2px solid var(--border); border-radius: 10px;
  }

  .citric-counter {
    display: flex; align-items: center; justify-content: center; gap: 16px;
    margin: 16px 0;
  }
  .citric-counter .count {
    font-size: 36px; font-weight: 700; min-width: 60px; text-align: center;
  }
  .citric-counter button {
    width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--border);
    background: white; font-size: 24px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
  }
  .citric-counter button:hover { background: #f0f0f0; }

  /* SUMMARY */
  .summary-table { width: 100%; border-collapse: collapse; }
  .summary-table td {
    padding: 12px 16px; border-bottom: 1px solid #f0f0f0;
  }
  .summary-table td:first-child { font-weight: 600; color: var(--text-light); width: 40%; }
  .summary-table .photo-thumb {
    width: 60px; height: 60px; object-fit: cover; border-radius: 8px;
  }

  /* MONDAY STATUS */
  .monday-status {
    display: none; padding: 12px 16px; border-radius: 10px;
    font-size: 14px; font-weight: 600; margin-top: 16px;
    text-align: center;
  }
  .monday-status.submitting { background: #e8f0fe; color: var(--primary); }
  .monday-status.success { background: #e6f4ea; color: var(--success); }
  .monday-status.error { background: #fce8e6; color: var(--danger); }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px; background: #323232;
    color: white; padding: 14px 24px; border-radius: 10px;
    font-size: 14px; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    transform: translateY(100px); opacity: 0; transition: all 0.3s;
    z-index: 9999;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .stats-row { grid-template-columns: 1fr; }
    .step-card { padding: 20px; }
    .login-card { padding: 32px 24px; margin: 16px; }
  }
</style>
</head>
<body>

<!-- HEADER (hidden on login) -->
<div class="header" id="appHeader" style="display:none;">
  <h1>Biomass Batch Processing SOP</h1>
  <div class="user-info">
    <span id="headerDate"></span>
    <div class="avatar" id="headerAvatar"></div>
    <span id="headerName"></span>
    <button onclick="logout()">Clock Out</button>
  </div>
</div>

<!-- LOGIN SCREEN -->
<div class="login-screen active" id="loginScreen">
  <div class="login-card">
    <div class="logo">&#9879;</div>
    <h1>Operator Check-In</h1>
    <p>Enter your 4-digit code</p>
    <div class="form-group">
      <label>Operator Code</label>
      <input type="password" id="operatorCode" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" placeholder="####" autofocus required>
    </div>
    <button class="btn btn-primary btn-block btn-lg" onclick="login()">Clock In</button>
    <div id="loginError" style="color: var(--danger); font-size: 14px; margin-top: 15px; text-align: center; display: none;"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="screen" id="dashboardScreen">
  <div class="dashboard-header">
    <h2>Dashboard</h2>
    <button class="btn btn-primary" onclick="startNewBatch()">+ New Batch</button>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">Batches Today</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statCompleted">0</div>
      <div class="stat-label">Completed</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statAvgPh">--</div>
      <div class="stat-label">Avg Final pH</div>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-bottom:16px;">Today's Batches</h3>
    <div id="batchList">
      <p style="color:var(--text-light); text-align:center; padding:24px;">No batches yet. Click "+ New Batch" to start.</p>
    </div>
  </div>
</div>

<!-- SOP WORKFLOW -->
<div class="screen" id="sopScreen">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
    <h2 id="sopBatchName" style="font-family:monospace; color:var(--primary);"></h2>
    <button class="btn btn-outline" style="padding:8px 16px; font-size:13px;" onclick="cancelBatch()">Cancel Batch</button>
  </div>
  <div class="sop-progress" id="sopProgress"></div>
  <div id="sopStepContainer"></div>
</div>

<!-- BATCH SUMMARY -->
<div class="screen" id="summaryScreen">
  <div class="card" style="text-align:center; padding:32px;">
    <div style="font-size:48px; margin-bottom:16px;">&#10003;</div>
    <h2 style="margin-bottom:8px;">Batch Complete!</h2>
    <p style="color:var(--text-light);" id="summaryBatchId"></p>
  </div>
  <div class="card">
    <h3 style="margin-bottom:16px;">Batch Summary</h3>
    <table class="summary-table" id="summaryTable"></table>
  </div>

  <!-- Monday.com Status Indicator -->
  <div class="monday-status" id="mondayStatus"></div>

  <div style="display:flex; gap:12px; margin-top:16px;">
    <button class="btn btn-success btn-block btn-lg" onclick="completeBatch()" id="completeBatchBtn">&#10003; Complete Batch</button>
  </div>

  <!-- Retry Button (hidden by default) -->
  <div style="margin-top:12px; text-align:center;">
    <button class="btn btn-danger" id="retryMondayBtn" style="display:none;" onclick="retryMondaySubmit()">&#8635; Retry Monday.com Submission</button>
  </div>

  <div style="margin-top:12px; text-align:center;">
    <button class="btn btn-outline" onclick="exportCSV()">Download as CSV</button>
  </div>
  <div id="postCompleteActions" style="display:none; margin-top:24px;">
    <button class="btn btn-primary btn-block btn-lg" onclick="startNewBatch()">+ Start New Batch</button>
    <div style="margin-top:12px; text-align:center;">
      <button class="btn btn-outline" onclick="showScreen('dashboardScreen'); updateDashboard();">Back to Dashboard</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ==================== MONDAY.COM API CONFIG ====================
const MONDAY_API_URL = 'https://api.monday.com/v2';
const MONDAY_API_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjYyNzA3NzcxOSwiYWFpIjoxMSwidWlkIjo3NTA2NTY3OCwiaWFkIjoiMjAyNi0wMi0yOFQwMToxNzowOS4wMDBaIiwicGVyIjoibWU6d3JpdGUiLCJhY3RpZCI6MjkxNDg2NzMsInJnbiI6InVzZTEifQ.ocD9w0Q-17JqNfU4iZXL4i3frn_Bw4pyVe_fkhJuiPg';

// Board: Refinery Process flow Data (Aldous) - Production Log
const PRODUCTION_BOARD_ID = 18402825582;
// Board: Biomass Batch Records (Aldous)
const ALDOUS_BOARD_ID = 18402821844;

// File column IDs on Aldous board
const ALDOUS_BIOMASS_PHOTO_COL = 'file_mm16eqyx';  // "Biomass Boxes photo"
const ALDOUS_PH_PHOTO_COL = 'file_mm16rne3';       // "PH meter Photo"
const MONDAY_FILE_URL = 'https://api.monday.com/v2/file';

// ==================== OPERATOR CODES ====================
const OPERATOR_CODES = {
  '4584': 'Frank',
  '8978': 'Chris',
  '5575': 'Fern',
  '5745': 'Jorge',
  '7787': 'Q',
  '4821': 'Joshua Medina',
  '0021': 'Dylan',
  '0001': 'Jeremy'
};

// ==================== STATE ====================
let state = {
  operator: null,
  batches: [],
  currentBatch: null,
  currentStep: 0,
  _lastCompleted: null,
};

const STEPS = [
  {
    id: 'water',
    title: 'Add Water to LETINA A',
    desc: 'Add <strong>500 gallons</strong> of water to the LETINA A tank. Confirm when water has been added.',
    type: 'confirm',
    field: 'waterAdded',
  },
  {
    id: 'citric1',
    title: 'Add Initial Citric Acid',
    desc: 'Add <strong>1 bag</strong> of citric acid to the LETINA A tank.',
    type: 'confirm',
    field: 'initialCitricAdded',
  },
  {
    id: 'photo_boxes',
    title: 'Photo: Biomass Boxes',
    desc: 'Take a photo of the <strong>7 boxes of biomass</strong> BEFORE loading them into the LETINA A. This photo is required to proceed.',
    type: 'photo',
    field: 'biomassBoxesPhoto',
  },
  {
    id: 'biomass',
    title: 'Load Biomass into LETINA A',
    desc: 'Load all <strong>7 boxes of biomass</strong> into the LETINA A tank.',
    type: 'confirm',
    field: 'biomassLoaded',
  },
  {
    id: 'ph_check',
    title: 'Check & Adjust pH',
    desc: 'Check the pH level. If pH is above 3.0, add more citric acid and re-check. Continue until pH reaches <strong>3.0 or lower</strong>.',
    type: 'ph',
    field: 'phReadings',
  },
  {
    id: 'photo_ph',
    title: 'Photo: pH Meter Reading',
    desc: 'Take a photo of the <strong>pH meter</strong> showing the final reading of 3.0 or lower. This photo is required to proceed.',
    type: 'photo',
    field: 'phMeterPhoto',
  },
  {
    id: 'pump',
    title: 'Pump Batch Into System',
    desc: 'Begin pumping the batch from LETINA A into the system. Confirm when pumping is complete.',
    type: 'confirm',
    field: 'pumpComplete',
  },
  {
    id: 'done',
    title: 'Batch Complete',
    desc: 'All steps completed! Review the batch summary.',
    type: 'final',
  },
];

// ==================== HELPERS ====================
function getDateString() {
  const d = new Date();
  return String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
}

function generateBatchName() {
  const dateStr = getDateString();
  const initials = state.operator.split(' ').map(n => n[0]).join('').toUpperCase();
  const prefix = initials + '.' + dateStr;
  const todayCount = state.batches.filter(b => b.name.startsWith(prefix)).length;
  const num = todayCount + 1;
  return prefix + '.B' + num;
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

function showScreen(id) {
  document.querySelectorAll('.screen, .login-screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('appHeader').style.display = (id === 'loginScreen') ? 'none' : 'flex';
}

function formatTime(date) {
  return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

function fmtDate(dtStr) {
  if (!dtStr) return null;
  try {
    const d = new Date(dtStr);
    if (isNaN(d)) return null;
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  } catch(e) { return null; }
}

// ==================== LOGIN ====================
function login() {
  const code = document.getElementById('operatorCode').value.trim();
  const errorDiv = document.getElementById('loginError');

  if (!code) {
    errorDiv.textContent = 'Please enter your code';
    errorDiv.style.display = 'block';
    return;
  }
  if (!OPERATOR_CODES[code]) {
    errorDiv.textContent = 'Invalid code. Please try again.';
    errorDiv.style.display = 'block';
    document.getElementById('operatorCode').value = '';
    return;
  }

  const operator = OPERATOR_CODES[code];
  state.operator = operator;
  state.batches = [];

  const initials = operator.split(' ').map(n => n[0]).join('').toUpperCase();
  document.getElementById('headerAvatar').textContent = initials;
  document.getElementById('headerName').textContent = operator;
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

  showScreen('dashboardScreen');
  updateDashboard();
  showToast('Hi ' + operator.split(' ')[0] + '! Ready to go.', 'success');
}

function logout() {
  if (confirm('Clock out and return to login?')) {
    state.operator = null;
    state.currentBatch = null;
    state.currentStep = 0;
    document.getElementById('operatorCode').value = '';
    document.getElementById('loginError').style.display = 'none';
    showScreen('loginScreen');
  }
}

document.getElementById('operatorCode').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

// ==================== DASHBOARD ====================
function updateDashboard() {
  document.getElementById('statTotal').textContent = state.batches.length;
  document.getElementById('statCompleted').textContent = state.batches.filter(b => b.status === 'completed').length;

  if (state.batches.length > 0) {
    const phs = state.batches.filter(b => b.finalPh);
    if (phs.length > 0) {
      const avgPh = (phs.reduce((sum, b) => sum + b.finalPh, 0) / phs.length).toFixed(2);
      document.getElementById('statAvgPh').textContent = avgPh;
    } else {
      document.getElementById('statAvgPh').textContent = '--';
    }
  } else {
    document.getElementById('statAvgPh').textContent = '--';
  }

  const list = document.getElementById('batchList');
  if (state.batches.length === 0) {
    list.innerHTML = '<p style="color:var(--text-light); text-align:center; padding:24px;">No batches yet. Click "+ New Batch" to start.</p>';
    return;
  }

  list.innerHTML = state.batches.map(b => `
    <div class="batch-list-item">
      <div>
        <div class="batch-id">${b.name}</div>
        <div style="font-size:13px; color:var(--text-light);">Started: ${b.startTime} | Final pH: ${b.finalPh || '—'}${b.mondayItemId ? ' | Monday #' + b.mondayItemId : ''}</div>
      </div>
      <span class="batch-status ${b.status}">${b.status === 'completed' ? 'Completed' : 'In Progress'}</span>
    </div>
  `).join('');
}

// ==================== BATCH CREATION ====================
function startNewBatch() {
  document.getElementById('completeBatchBtn').style.display = '';
  document.getElementById('postCompleteActions').style.display = 'none';
  document.getElementById('retryMondayBtn').style.display = 'none';
  document.getElementById('mondayStatus').style.display = 'none';

  const name = generateBatchName();
  const today = new Date();
  state.currentBatch = {
    name,
    operator: state.operator,
    date: today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0'),
    startTime: formatTime(today),
    startISO: today.toISOString(),
    endTime: null,
    endISO: null,
    status: 'in-progress',
    waterAdded: false,
    initialCitricAdded: false,
    biomassBoxesPhoto: null,
    biomassLoaded: false,
    phReadings: [],
    additionalCitricBags: 0,
    finalPh: null,
    phMeterPhoto: null,
    pumpComplete: false,
    mondayItemId: null,
    aldousItemId: null,
  };
  state.currentStep = 0;

  document.getElementById('sopBatchName').textContent = name;
  showScreen('sopScreen');
  renderStep();
}

function cancelBatch() {
  if (confirm('Are you sure you want to cancel this batch? All data will be lost.')) {
    state.currentBatch = null;
    state.currentStep = 0;
    showScreen('dashboardScreen');
  }
}

// ==================== SOP RENDERING ====================
function renderStep() {
  const step = STEPS[state.currentStep];
  const totalSteps = STEPS.length;

  const prog = document.getElementById('sopProgress');
  prog.innerHTML = STEPS.map((_, i) => {
    let cls = 'step-dot';
    if (i < state.currentStep) cls += ' done';
    else if (i === state.currentStep) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');

  const container = document.getElementById('sopStepContainer');

  if (step.type === 'confirm') {
    container.innerHTML = `
      <div class="step-card active">
        <div class="step-number">${state.currentStep + 1}</div>
        <div class="step-title">${step.title}</div>
        <div class="step-desc">${step.desc}</div>
        <div class="step-actions">
          <button class="btn btn-success btn-block btn-lg" onclick="confirmStep()">
            &#10003; Confirm Completed
          </button>
        </div>
      </div>
    `;
  } else if (step.type === 'photo') {
    const existing = state.currentBatch[step.field];
    container.innerHTML = `
      <div class="step-card active">
        <div class="step-number">${state.currentStep + 1}</div>
        <div class="step-title">${step.title}</div>
        <div class="step-desc">${step.desc}</div>
        <div class="photo-upload ${existing ? 'has-photo' : ''}" onclick="document.getElementById('photoInput').click()">
          <input type="file" id="photoInput" accept="image/*" capture="environment" onchange="handlePhoto(event, '${step.field}')">
          <div class="icon">${existing ? '&#10003;' : '&#128247;'}</div>
          <div class="label">${existing ? 'Photo captured! Tap to retake.' : 'Tap to take photo or upload'}</div>
          ${existing ? `<img src="${existing}" alt="captured photo">` : ''}
        </div>
        <div class="step-actions">
          <button class="btn btn-success btn-block btn-lg" onclick="confirmStep()" ${!existing ? 'disabled' : ''} id="photoNextBtn">
            &#10003; Continue
          </button>
        </div>
      </div>
    `;
  } else if (step.type === 'ph') {
    const readings = state.currentBatch.phReadings;
    const lastPh = readings.length > 0 ? readings[readings.length - 1] : null;
    const phOk = lastPh !== null && lastPh <= 3.0;
    const phClass = lastPh === null ? 'neutral' : (phOk ? 'target' : 'high');

    let readingsHtml = '';
    if (readings.length > 0) {
      readingsHtml = '<div style="margin-top:16px;"><strong>pH Log:</strong><ul style="margin-top:8px; list-style:none; padding:0;">' +
        readings.map((r, i) => `<li style="padding:6px 0; border-bottom:1px solid #f0f0f0; font-family:monospace;">
          Reading #${i+1}: <strong style="color:${r <= 3.0 ? 'var(--success)' : 'var(--danger)'}">${r}</strong>
          ${i > 0 ? ' (+1 bag citric acid)' : ' (initial)'}
        </li>`).join('') + '</ul></div>';
    }

    container.innerHTML = `
      <div class="step-card active">
        <div class="step-number">${state.currentStep + 1}</div>
        <div class="step-title">${step.title}</div>
        <div class="step-desc">${step.desc}</div>

        <div class="ph-display ${phClass}">
          ${lastPh !== null ? lastPh.toFixed(1) : '—'}
          <div style="font-size:14px; font-weight:400; margin-top:4px;">
            ${lastPh !== null ? (phOk ? 'pH TARGET REACHED' : 'pH TOO HIGH — Add more citric acid') : 'Enter pH reading below'}
          </div>
        </div>

        <div class="ph-input-row">
          <input type="number" id="phInput" step="0.1" min="0" max="14" placeholder="0.0" onkeydown="if(event.key==='Enter')recordPh()">
          <button class="btn btn-primary" onclick="recordPh()">Record pH</button>
        </div>

        ${!phOk && readings.length > 0 ? `
          <div style="text-align:center; margin-top:16px;">
            <p style="color:var(--text-light); margin-bottom:8px;">Additional citric acid bags added: <strong>${state.currentBatch.additionalCitricBags}</strong></p>
            <button class="btn btn-outline" onclick="addCitricAcid()">+ Add 1 Bag Citric Acid</button>
          </div>
        ` : ''}

        ${readingsHtml}

        ${phOk ? `
          <div class="step-actions">
            <button class="btn btn-success btn-block btn-lg" onclick="confirmStep()">
              &#10003; pH Confirmed — Continue
            </button>
          </div>
        ` : ''}
      </div>
    `;
  } else if (step.type === 'final') {
    showBatchSummary();
    return;
  }
}

// ==================== STEP HANDLERS ====================
function confirmStep() {
  const step = STEPS[state.currentStep];
  if (step.field && step.type === 'confirm') {
    state.currentBatch[step.field] = true;
  }
  state.currentStep++;
  renderStep();
}

function handlePhoto(event, field) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    state.currentBatch[field] = e.target.result;
    renderStep();
  };
  reader.readAsDataURL(file);
}

function recordPh() {
  const input = document.getElementById('phInput');
  const val = parseFloat(input.value);
  if (isNaN(val) || val < 0 || val > 14) {
    showToast('Enter a valid pH (0-14)', 'error');
    return;
  }
  state.currentBatch.phReadings.push(val);
  if (val <= 3.0) {
    state.currentBatch.finalPh = val;
  }
  renderStep();
}

function addCitricAcid() {
  state.currentBatch.additionalCitricBags++;
  showToast('Added 1 bag citric acid. Check pH again.', 'success');
  renderStep();
}

// ==================== SUMMARY ====================
function showBatchSummary() {
  const b = state.currentBatch;
  b.endTime = formatTime(new Date());
  b.endISO = new Date().toISOString();

  document.getElementById('summaryBatchId').textContent = b.name;

  const totalCitric = 1 + b.additionalCitricBags;
  const phLog = b.phReadings.map((r,i) => `#${i+1}: ${r}`).join(', ');

  document.getElementById('summaryTable').innerHTML = `
    <tr><td>Batch ID</td><td><strong>${b.name}</strong></td></tr>
    <tr><td>Operator</td><td>${b.operator}</td></tr>
    <tr><td>Date</td><td>${b.date}</td></tr>
    <tr><td>Start Time</td><td>${b.startTime}</td></tr>
    <tr><td>End Time</td><td>${b.endTime}</td></tr>
    <tr><td>Water Added</td><td>500 gallons</td></tr>
    <tr><td>Biomass Boxes</td><td>7 boxes</td></tr>
    <tr><td>Total Citric Acid</td><td>${totalCitric} bag(s)</td></tr>
    <tr><td>pH Readings</td><td style="font-family:monospace;">${phLog}</td></tr>
    <tr><td>Final pH</td><td><strong style="color:var(--success);">${b.finalPh}</strong></td></tr>
    <tr><td>Biomass Boxes Photo</td><td>${b.biomassBoxesPhoto ? '<img class="photo-thumb" src="'+b.biomassBoxesPhoto+'" onclick="openPhoto(this.src)">' : 'Missing'}</td></tr>
    <tr><td>pH Meter Photo</td><td>${b.phMeterPhoto ? '<img class="photo-thumb" src="'+b.phMeterPhoto+'" onclick="openPhoto(this.src)">' : 'Missing'}</td></tr>
    <tr><td>Pumped to System</td><td>&#10003; Yes</td></tr>
  `;

  showScreen('summaryScreen');
}

function openPhoto(src) {
  const w = window.open();
  w.document.write(`<img src="${src}" style="max-width:100%; max-height:100vh;">`);
}

// ==================== MONDAY.COM API SUBMISSION ====================
function updateMondayStatus(status, message) {
  const el = document.getElementById('mondayStatus');
  el.style.display = 'block';
  el.className = 'monday-status ' + status;
  if (status === 'submitting') {
    el.innerHTML = '<span style="display:inline-block;animation:spin 1s linear infinite;margin-right:8px;">&#10227;</span>' + message;
  } else if (status === 'success') {
    el.innerHTML = '&#10003; ' + message;
  } else if (status === 'error') {
    el.innerHTML = '&#10007; ' + message;
  }
}

function autoSubmitToProductionBoard(batch) {
  const totalCitric = 1 + batch.additionalCitricBags;
  const phLog = batch.phReadings.map((r,i) => '#' + (i+1) + ': ' + r).join(', ');
  const duration = batch.startTime + ' - ' + batch.endTime;

  var columnValues = JSON.stringify({
    "date4": { "date": batch.date },
    "text_mm16pd4m": batch.operator,
    "text_mm166879": batch.name,
    "text_mm1635": duration,
    "numeric_mm16yzab": batch.finalPh
  });

  var itemName = batch.name.replace(/"/g, '\\"');
  var mutation = 'mutation { create_item (board_id: ' + PRODUCTION_BOARD_ID + ', item_name: "' + itemName + '", column_values: ' + JSON.stringify(columnValues) + ') { id } }';

  return fetch(MONDAY_API_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': MONDAY_API_TOKEN,
      'API-Version': '2024-10'
    },
    body: JSON.stringify({ query: mutation })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.data && data.data.create_item && data.data.create_item.id) {
      console.log('Production board item created:', data.data.create_item.id);
      return { success: true, id: data.data.create_item.id };
    } else {
      console.warn('Production board response:', JSON.stringify(data));
      return { success: false, error: data.errors ? data.errors[0].message : 'Unknown error' };
    }
  })
  .catch(function(err) {
    console.error('Production board API error:', err);
    return { success: false, error: err.message };
  });
}

// ==================== FILE UPLOAD ====================
function dataURLtoBlob(dataURL) {
  var parts = dataURL.split(',');
  var mime = parts[0].match(/:(.*?);/)[1];
  var bstr = atob(parts[1]);
  var n = bstr.length;
  var u8arr = new Uint8Array(n);
  while (n--) { u8arr[n] = bstr.charCodeAt(n); }
  return new Blob([u8arr], { type: mime });
}

function uploadFileToMonday(itemId, columnId, dataURL, filename) {
  if (!dataURL) return Promise.resolve({ success: false, error: 'No photo data' });

  var blob = dataURLtoBlob(dataURL);
  var ext = blob.type === 'image/png' ? '.png' : '.jpg';
  var fullFilename = filename + ext;

  var query = 'mutation ($file: File!) { add_file_to_column (item_id: ' + itemId + ', column_id: "' + columnId + '", file: $file) { id } }';

  var formData = new FormData();
  formData.append('query', query);
  formData.append('variables[file]', blob, fullFilename);

  return fetch(MONDAY_FILE_URL, {
    method: 'POST',
    headers: {
      'Authorization': MONDAY_API_TOKEN
    },
    body: formData
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.data && data.data.add_file_to_column && data.data.add_file_to_column.id) {
      console.log('File uploaded to column ' + columnId + ':', data.data.add_file_to_column.id);
      return { success: true, id: data.data.add_file_to_column.id };
    } else {
      console.warn('File upload response:', JSON.stringify(data));
      return { success: false, error: data.errors ? data.errors[0].message : (data.error_message || 'Unknown error') };
    }
  })
  .catch(function(err) {
    console.error('File upload error:', err);
    return { success: false, error: err.message };
  });
}

function uploadBatchPhotos(itemId, batch) {
  var uploads = [];

  if (batch.biomassBoxesPhoto) {
    uploads.push(
      uploadFileToMonday(itemId, ALDOUS_BIOMASS_PHOTO_COL, batch.biomassBoxesPhoto, batch.name.replace(/[\/\.]/g, '-') + '-biomass-boxes')
    );
  }

  if (batch.phMeterPhoto) {
    uploads.push(
      uploadFileToMonday(itemId, ALDOUS_PH_PHOTO_COL, batch.phMeterPhoto, batch.name.replace(/[\/\.]/g, '-') + '-ph-meter')
    );
  }

  if (uploads.length === 0) return Promise.resolve({ success: true, uploaded: 0 });

  return Promise.allSettled(uploads).then(function(results) {
    var successes = results.filter(function(r) { return r.status === 'fulfilled' && r.value.success; }).length;
    var failures = results.filter(function(r) { return r.status !== 'fulfilled' || !r.value.success; }).length;
    return { success: failures === 0, uploaded: successes, failed: failures };
  });
}

function submitToAldousBoard(batch) {
  var columnValues = JSON.stringify({
    "date4": { "date": batch.date },
    "text_mm166879": batch.name,
    "text_mm16pd4m": batch.operator,
    "text_mm1635": batch.startTime + ' - ' + batch.endTime,
    "numeric_mm16yzab": batch.finalPh
  });

  var itemName = batch.name.replace(/"/g, '\\"');
  var mutation = 'mutation { create_item (board_id: ' + ALDOUS_BOARD_ID + ', item_name: "' + itemName + '", column_values: ' + JSON.stringify(columnValues) + ') { id } }';

  return fetch(MONDAY_API_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': MONDAY_API_TOKEN,
      'API-Version': '2024-10'
    },
    body: JSON.stringify({ query: mutation })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.data && data.data.create_item && data.data.create_item.id) {
      console.log('Aldous board item created:', data.data.create_item.id);
      return { success: true, id: data.data.create_item.id };
    } else {
      console.warn('Aldous board response:', JSON.stringify(data));
      return { success: false, error: data.errors ? data.errors[0].message : 'Unknown error' };
    }
  })
  .catch(function(err) {
    console.error('Aldous board API error:', err);
    return { success: false, error: err.message };
  });
}

function completeBatch() {
  const batch = state.currentBatch;
  if (!batch) return;

  // Disable button to prevent double-clicks
  document.getElementById('completeBatchBtn').disabled = true;
  document.getElementById('retryMondayBtn').style.display = 'none';

  updateMondayStatus('submitting', 'Submitting to Monday.com...');

  // Store reference for retry
  state._lastCompleted = batch;

  // Fire both API submissions in parallel
  Promise.allSettled([
    autoSubmitToProductionBoard(batch),
    submitToAldousBoard(batch)
  ]).then(function(results) {
    const prodResult = results[0].status === 'fulfilled' ? results[0].value : { success: false, error: 'Network failure' };
    const aldousResult = results[1].status === 'fulfilled' ? results[1].value : { success: false, error: 'Network failure' };

    if (prodResult.success) batch.mondayItemId = prodResult.id;
    if (aldousResult.success) batch.aldousItemId = aldousResult.id;

    if (!prodResult.success && !aldousResult.success) {
      // Both failed
      updateMondayStatus('error', 'Monday.com sync failed: ' + (prodResult.error || aldousResult.error));
      showToast('Monday.com submission failed. Retry available.', 'error');
      document.getElementById('retryMondayBtn').style.display = '';
      finalizeBatch();
      return;
    }

    if (!prodResult.success || !aldousResult.success) {
      const failedBoard = !prodResult.success ? 'Production Log' : 'Aldous Batch Records';
      const failError = !prodResult.success ? prodResult.error : aldousResult.error;
      updateMondayStatus('error', 'Partial sync — ' + failedBoard + ' failed: ' + failError);
      showToast('Partial Monday.com sync. Retry recommended.', 'error');
      document.getElementById('retryMondayBtn').style.display = '';
      // Still try to upload photos if Aldous item was created
    }

    // Upload photos to Aldous board if item was created
    if (aldousResult.success && (batch.biomassBoxesPhoto || batch.phMeterPhoto)) {
      updateMondayStatus('submitting', 'Uploading photos to Monday.com...');
      uploadBatchPhotos(aldousResult.id, batch).then(function(photoResult) {
        if (photoResult.success) {
          batch.photosUploaded = true;
          var msg = 'Synced to Monday.com';
          if (prodResult.success) msg += ' (Production #' + prodResult.id + ')';
          msg += ' — Aldous #' + aldousResult.id + ' with ' + photoResult.uploaded + ' photo(s)';
          updateMondayStatus('success', msg);
          showToast('Batch & photos synced to Monday.com!', 'success');
        } else {
          batch.photosUploaded = false;
          var msg = 'Items created but ' + photoResult.failed + ' photo(s) failed to upload';
          updateMondayStatus('error', msg);
          showToast('Photos failed to upload. Retry available.', 'error');
          document.getElementById('retryMondayBtn').style.display = '';
        }
        finalizeBatch();
      });
    } else {
      // No photos to upload or Aldous failed
      if (prodResult.success && aldousResult.success) {
        updateMondayStatus('success', 'Synced to Monday.com (Production #' + prodResult.id + ', Aldous #' + aldousResult.id + ')');
        showToast('Batch saved & synced to Monday.com!', 'success');
      }
      finalizeBatch();
    }
  });
}

function retryMondaySubmit() {
  const batch = state._lastCompleted;
  if (!batch) {
    showToast('No batch data to retry', 'error');
    return;
  }
  document.getElementById('retryMondayBtn').style.display = 'none';
  updateMondayStatus('submitting', 'Retrying Monday.com submission...');

  // Only retry the boards that haven't been submitted yet
  const promises = [];
  if (!batch.mondayItemId) promises.push(autoSubmitToProductionBoard(batch));
  else promises.push(Promise.resolve({ success: true, id: batch.mondayItemId }));

  if (!batch.aldousItemId) promises.push(submitToAldousBoard(batch));
  else promises.push(Promise.resolve({ success: true, id: batch.aldousItemId }));

  Promise.allSettled(promises).then(function(results) {
    const prodResult = results[0].status === 'fulfilled' ? results[0].value : { success: false, error: 'Network failure' };
    const aldousResult = results[1].status === 'fulfilled' ? results[1].value : { success: false, error: 'Network failure' };

    if (prodResult.success) batch.mondayItemId = prodResult.id;
    if (aldousResult.success) batch.aldousItemId = aldousResult.id;

    if (!prodResult.success || !aldousResult.success) {
      const failedBoards = [];
      if (!prodResult.success) failedBoards.push('Production Log');
      if (!aldousResult.success) failedBoards.push('Aldous Batch Records');
      updateMondayStatus('error', 'Failed: ' + failedBoards.join(' & ') + ' — ' + (prodResult.error || aldousResult.error));
      showToast('Retry failed. Try again.', 'error');
      document.getElementById('retryMondayBtn').style.display = '';
      return;
    }

    // Both items exist — now retry photos if needed
    if (!batch.photosUploaded && aldousResult.id && (batch.biomassBoxesPhoto || batch.phMeterPhoto)) {
      updateMondayStatus('submitting', 'Uploading photos to Monday.com...');
      uploadBatchPhotos(aldousResult.id, batch).then(function(photoResult) {
        if (photoResult.success) {
          batch.photosUploaded = true;
          updateMondayStatus('success', 'Synced to Monday.com (Production #' + prodResult.id + ', Aldous #' + aldousResult.id + ') with ' + photoResult.uploaded + ' photo(s)');
          showToast('Monday.com sync successful with photos!', 'success');
        } else {
          updateMondayStatus('error', 'Items synced but ' + photoResult.failed + ' photo(s) failed');
          showToast('Photo upload failed. Try again.', 'error');
          document.getElementById('retryMondayBtn').style.display = '';
        }
      });
    } else {
      updateMondayStatus('success', 'Synced to Monday.com (Production #' + prodResult.id + ', Aldous #' + aldousResult.id + ')');
      showToast('Monday.com sync successful!', 'success');
    }
  });
}

// ==================== FINALIZE & SAVE ====================
function finalizeBatch() {
  const b = state.currentBatch;
  b.status = 'completed';
  state.batches.push(b);

  state.currentBatch = null;
  state.currentStep = 0;

  document.getElementById('completeBatchBtn').style.display = 'none';
  document.getElementById('postCompleteActions').style.display = 'block';
}

function exportCSV() {
  const b = state._lastCompleted || state.batches[state.batches.length - 1];
  if (!b) return;

  const totalCitric = 1 + b.additionalCitricBags;
  const rows = [
    ['Field', 'Value'],
    ['Batch ID', b.name],
    ['Operator', b.operator],
    ['Date', b.date],
    ['Start Time', b.startTime],
    ['End Time', b.endTime],
    ['Water (gallons)', '500'],
    ['Biomass Boxes', '7'],
    ['Total Citric Acid Bags', totalCitric],
    ['pH Readings', b.phReadings.join(' > ')],
    ['Final pH', b.finalPh],
    ['Pump Complete', 'Yes'],
    ['Biomass Photo Taken', b.biomassBoxesPhoto ? 'Yes' : 'No'],
    ['pH Photo Taken', b.phMeterPhoto ? 'Yes' : 'No'],
    ['Monday.com Production Item', b.mondayItemId || 'N/A'],
    ['Monday.com Aldous Item', b.aldousItemId || 'N/A'],
  ];

  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = b.name.replace(/\//g, '-') + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV downloaded!', 'success');
}
